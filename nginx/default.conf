server {
    listen 80;
    server_name api.ridebook.tinhlelaptrinh.id.vn;
    
    # Tự động chuyển hướng từ HTTP sang HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.ridebook.tinhlelaptrinh.id.vn;

    # Đường dẫn chứng chỉ SSL đã mount vào container
    ssl_certificate /etc/letsencrypt/live/api.ridebook.tinhlelaptrinh.id.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.ridebook.tinhlelaptrinh.id.vn/privkey.pem;

    location / {
        proxy_pass http://ridebook-backend-v1:8080; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Hỗ trợ WebSocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }
}