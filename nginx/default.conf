server {
    listen 80;
    server_name api.ridebook.tinhlelaptrinh.id.vn;
    
    # Tự động chuyển hướng từ HTTP sang HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.ridebook.tinhlelaptrinh.id.vn;

    # Đường dẫn chứng chỉ SSL đã mount vào container
    ssl_certificate /etc/letsencrypt/live/api.ridebook.tinhlelaptrinh.id.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.ridebook.tinhlelaptrinh.id.vn/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ========== Security Headers ==========
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ========== Rate Limiting ==========
    # Định nghĩa zone cho rate limit
    limit_req_zone $binary_remote_addr zone=auction_api:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=auction_conn:10m;

    location / {
          # ----- Rate Limiting -----
        limit_req zone=auction_api burst=20 nodelay;
        limit_conn auction_conn 10;
        limit_req_status 429;  # Too Many Requests

        proxy_pass http://ridebook-backend-v1:8080; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Hỗ trợ WebSocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }
}