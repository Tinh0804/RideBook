version: '3.8'

services:
  app:
    build: .
    container_name: backend
    ports:
      - "8080:8080"
    depends_on:
      - postgresdb
      - redis

  postgresdb:
    image: postgres:15-alpine
    container_name: postgres_ridebook
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=@Tinh0804
      - POSTGRES_DB=BookCar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: redis_ridebook
    ports:
      - "6379:6379"

volumes:
  postgres_data:
