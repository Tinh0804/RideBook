server:
    servlet:
         context-path: "/RideBook"
spring:
    main:
        allow-bean-definition-overriding: true
    application:
        name: BookCarOnline
    data:
        redis:
            url: ${REDIS_URL:redis://localhost:6379}
            database: ${REDIS_DATABASE:0}
    datasource:
        url: ${DB_URL}
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}
        driver-class-name: org.postgresql.Driver

    jpa:
        hibernate:
#            ddl-auto: update
        show-sql: true
        format-sql: true
    sql:
        init:
            enabled: true
    security:
        user:
            name: ${SECURITY_USER_NAME}
            password: ${SECURITY_USER_PASSWORD}

        oauth2:
            client:
                registration:
                    google:
                        client-id: ${GOOGLE_CLIENT_ID}
                        client-secret: ${GOOGLE_CLIENT_SECRET}
                        grant-type: authorization_code
                        scope:
                            - profile
                            - email
                        redirect-uri: ${GOOGLE_REDIRECT_URI} #for mobile
                        token-uri: https://oauth2.googleapis.com/token
                        user-info-uri: https://www.googleapis.com/oauth2/v2/userinfo
                    facebook:
                        client-id: ${FACEBOOK_CLIENT_ID}
                        client-secret: ${FACEBOOK_CLIENT_SECRET}
                        scope:
                            - public_profile
                            - email
                        redirect-uri: ${FACEBOOK_REDIRECT_URI}
                        token-uri: https://graph.facebook.com/v17.0/oauth/access_token
                        user-info-uri: https://graph.facebook.com/me?fields=id,name,email,picture

                provider:
#                    do google đã có provider mặt định
                    facebook:
                        authorization-uri: https://www.facebook.com/v20.0/dialog/oauth
                        token-uri: https://graph.facebook.com/v20.0/oauth/access_token
                        user-info-uri: https://graph.facebook.com/me?fields=id,name,email,picture
                        user-name-attribute: id
    servlet:
        multipart:
            max-file-size: 5MB
            max-request-size: 5MB
jwt:
    signerKey: ${JWT_SIGNER_KEY}
    valid-duration : 3600
    refreshable-duration : 36000

vnpay:
    tmn-code: ${VNPAY_TMN_CODE}
    hash-secret: ${VNPAY_HASH_SECRET}
    api-url: ${VNPAY_API_URL}
    return-url: ${VNPAY_RETURN_URL}
    version: "2.1.0"
    command: "pay"
    order-type: "other"
    time-zone-id": "SE Asia Standard Time"

momo:
    partner-code: ${MOMO_PARTNER_CODE}
    access-key: ${MOMO_ACCESS_KEY}
    secret-key: ${MOMO_SECRET_KEY}
    api-url: ${MOMO_API_URL}
    return-url: ${MOMO_RETURN_URL}
    notify-url: ${MOMO_NOTIFY_URL}
    request-type: "captureWallet"
firebase:
    bucket-name: "ridebook-dc1ad.firebasestorage.app"
    config-path: "firebase/firebase-adminsdk.json"
springdoc:
    api-docs:
        enabled: true
        path: /v3/api-docs
    swagger-ui:
        enabled: true
        path: /swagger-ui.html
        operations-sorter: method
        tags-sorter: alpha
google:
    maps:
        api-key: ${GOOGLE_MAPS_API_KEY}

app:
    commission:
        platform-rate: 0.3
    time-to-live:
        otp: 300000
        password-reset-token: 3600000
        quote: 120
    max-login-attempts: 5

frontend:
    url: ${FRONTEND_URL}