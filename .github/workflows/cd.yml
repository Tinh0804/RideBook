name: CD Pipeline
run-name: ${{ github.actor }}
on:
  workflow_run: 
    workflows:
      - "CI Pipeline" 
    types: 
      - completed 
    branches: ['main','master','test']

jobs: 
  deploy-backend: 
    name: Deploy Backend 
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }} 
    steps: 
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }} 

