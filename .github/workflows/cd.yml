      #       echo "Deploy Backend EC2 Successfully"
          # 1. Copy docker-compose sang Google Cloud VM
      - name: Copy docker-compose to GCP VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.GCP_VM_IP }}         
          username: ${{ secrets.GCP_VM_USER }}  
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }} 
          port: 22
          source: "Backend/docker-compose.yml"
          target: "/home/ubuntu/ridebook"         
          strip_components: 1
      
      - name: Copy Nginx Config to VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          port: 22
          source: "nginx/default.conf" 
          target: "/home/ubuntu/ridebook/nginx"

      - name: Cleanup old Auction images
        uses: appleboy/ssh-action@v1.0.3
        with: 
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USER }} 
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }} 
          port: 22
          script: |
            echo "🧹 Cleaning up old Auction images..."
            
            # Xóa các image auction cũ (giữ lại 2 image gần nhất)
            sudo docker images | grep "tinh08042005/ridebook-backend" | grep -v "latest" | tail -n +3 | awk '{print $3}' | xargs -r sudo docker rmi -f 2>/dev/null || true
            
            # Xóa dangling images
            sudo docker image prune -f
            
            echo "✅ Cleanup completed"

      # 2. SSH vào GCP VM và khởi chạy Docker Compose
      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@v1.0.3
        with: 
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USER }} 
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }} 
          port: 22
          script: |
            echo "Start Deploying to Google Cloud VM"
            
            # Khởi tạo thư mục làm việc của user ubuntu
            mkdir -p /home/ubuntu/ridebook
            cd /home/ubuntu/ridebook
            
            # Ghi mã định danh phiên bản code vào file .env
            echo "IMAGE_TAG=${{ github.event.workflow_run.head_sha }}" > .env
            echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" >> .env
            
            # Ghi toàn bộ nội dung file .env từ Github Secrets
            echo "${{ secrets.ENV_PROD }}" >> .env
            
            # Dọn dẹp rác Docker cho đúng cú pháp chuẩn
            sudo docker image prune -f
            
            # Khởi động Docker Compose với quyền sudo (Cần thiết trên Ubuntu mặc định)
            sudo docker compose pull ridebook-backend
            sudo docker compose up -d --force-recreate ridebook-backend

            sudo docker exec global-nginx nginx -s reload
            
            echo "Deploy Backend GCP Successfully"

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Trigger Vercel Deployment
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}" -d ""
