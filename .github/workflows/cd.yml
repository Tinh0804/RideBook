name: CD Pipeline
run-name: ${{ github.actor }}

# Chạy song song và cancel job cũ nếu có job mới
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_run: 
    workflows:
      - "CI Pipeline" 
    types: 
      - completed 
    branches: ['main','master','test']

jobs:
  deploy-backend:
    name: 🚀 Deploy Backend 
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 15
    steps: 
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 1

      # Cache SSH keys để giảm thời gian kết nối
      - name: Cache SSH known hosts
        uses: actions/cache@v3
        with:
          path: ~/.ssh/known_hosts
          key: ${{ runner.os }}-ssh-known-hosts-${{ secrets.GCP_VM_IP }}
          restore-keys: |
            ${{ runner.os }}-ssh-known-hosts

      - name: Copy docker-compose to GCP VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.GCP_VM_IP }}         
          username: ${{ secrets.GCP_VM_USER }}  
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }} 
          port: 22
          source: "Backend/docker-compose.yml"
          target: "/home/ubuntu/ridebook"         
          strip_components: 1
          overwrite: true

      - name: Copy Nginx Config to VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          port: 22
          source: "nginx/default.conf"
          target: "/home/ubuntu/ridebook/nginx/"
          overwrite: true
          strip_components: 0
          rm: false

      # Kiểm tra Docker images trên VM
      - name: Check Docker images on VM
        uses: appleboy/ssh-action@v1.0.3
        with: 
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USER }} 
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }} 
          port: 22
          script: |
            echo "🔍 Checking current Docker images..."
            sudo docker images | grep "tinh08042005/ridebook-backend" | head -5 || echo "No images found"

      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@v1.0.3
        with: 
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USER }} 
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }} 
          port: 22
          script: |
            echo "🚀 Start Deploying to Google Cloud VM"
            
            cd /home/ubuntu/ridebook
            
            # Tạo thư mục nginx nếu chưa có
            mkdir -p nginx
            
            # Ghi mã định danh phiên bản code
            echo "IMAGE_TAG=${{ github.event.workflow_run.head_sha }}" > .env
            echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" >> .env
            echo "${{ secrets.ENV_PROD }}" >> .env
            
            # Dọn dẹp chỉ khi cần thiết
            sudo docker image prune -f -a --filter "until=24h" || true
            
            # Pull và deploy chỉ khi có image mới
            echo "📦 Pulling new image..."
            sudo docker compose pull ridebook-backend
            
            echo "🔄 Recreating containers..."
            sudo docker compose up -d --force-recreate ridebook-backend
            
            # Reload Nginx nếu config thay đổi
            if [ -f "nginx/default.conf" ]; then
              echo "🔄 Reloading Nginx..."
              sudo docker exec global-nginx nginx -s reload || true
            fi
            
            # Cleanup old images (giữ lại 3 images gần nhất)
            echo "🧹 Cleaning up old images..."
            sudo docker images | grep "tinh08042005/ridebook-backend" | grep -v "latest" | tail -n +4 | awk '{print $3}' | xargs -r sudo docker rmi -f 2>/dev/null || true
            
            echo "✅ Deploy Backend GCP Successfully"

  deploy-frontend:
    name: 🚀 Deploy Frontend
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 5
    steps:
      # Checkout code để truy cập file package-lock.json
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 1

      # Setup Node với cache đúng đường dẫn
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './WebAPP/package-lock.json'

      # Kiểm tra xem frontend có thay đổi không
      - name: Check if frontend changed
        id: check-changes
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.repos.compareCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base: '${{ github.event.workflow_run.head_sha }}^',
              head: '${{ github.event.workflow_run.head_sha }}'
            });
            const frontendChanged = files.files.some(file => 
              file.filename.startsWith('WebAPP/') || 
              file.filename.startsWith('nginx/')
            );
            return frontendChanged;

      # Trigger Vercel nếu có thay đổi
      - name: Trigger Vercel Deployment
        if: steps.check-changes.outputs.result == 'true'
        run: |
          echo "🚀 Triggering Vercel deployment..."
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}" -d ""
          echo "✅ Vercel deployment triggered"

      - name: Skip deployment
        if: steps.check-changes.outputs.result == 'false'
        run: |
          echo "⏭️ No frontend changes, skipping Vercel deployment"